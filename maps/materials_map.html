<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mukuru Materials & Waste Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f5f0eb;
    color: #2c2c2c;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    background: #1a1a1a;
    color: #f0ebe4;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 1000;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  header p {
    font-size: 11px;
    color: #999;
    letter-spacing: 0.03em;
  }

  #map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* ── Right Panel: Layer Controls ── */
  #layer-panel {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 230px;
    background: rgba(255,252,248,0.97);
    border-radius: 10px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.14);
    z-index: 800;
    overflow: hidden;
    border: 1px solid #e0d8cf;
  }

  .panel-header {
    background: #2c2c2c;
    color: #f0ebe4;
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .layer-item {
    padding: 11px 14px;
    border-bottom: 1px solid #ede8e2;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .layer-item:last-child { border-bottom: none; }
  .layer-item:hover { background: #f7f3ef; }

  .layer-item.active { background: #f0ebe4; }

  .toggle-switch {
    position: relative;
    width: 34px;
    height: 18px;
    flex-shrink: 0;
  }

  .toggle-switch input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 9px;
    transition: background 0.2s;
    cursor: pointer;
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s;
  }

  input:checked + .toggle-track {
    background: #7a6a5a;
  }

  input:checked + .toggle-track::after {
    transform: translateX(16px);
  }

  .layer-label {
    font-size: 12px;
    font-weight: 500;
    color: #2c2c2c;
    flex: 1;
  }

  .layer-sub {
    font-size: 10px;
    color: #999;
  }

  /* ── Left Panel: Legend ── */
  #legend-panel {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 210px;
    background: rgba(255,252,248,0.97);
    border-radius: 10px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.14);
    z-index: 800;
    overflow: hidden;
    border: 1px solid #e0d8cf;
  }

  #legend-panel .panel-header {
    font-size: 10px;
  }

  .legend-section {
    padding: 10px 14px;
    border-bottom: 1px solid #ede8e2;
  }

  .legend-section:last-child { border-bottom: none; }

  .legend-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 7px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 11px;
    color: #333;
  }

  .legend-item:last-child { margin-bottom: 0; }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-circle {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid currentColor;
    background: transparent;
    flex-shrink: 0;
  }

  .legend-line {
    width: 22px;
    height: 0;
    border-top: 2px dashed currentColor;
    flex-shrink: 0;
  }

  .legend-plus {
    font-size: 13px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1;
    flex-shrink: 0;
    width: 14px;
    text-align: center;
  }

  /* tooltip */
  .leaflet-popup-content-wrapper {
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border: 1px solid #e0d8cf;
  }

  .leaflet-popup-content {
    margin: 12px 16px;
    font-size: 12px;
    line-height: 1.6;
    color: #2c2c2c;
    min-width: 180px;
    max-width: 240px;
  }

  .popup-name {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 6px;
    color: #1a1a1a;
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 2px;
  }

  .popup-label {
    color: #888;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .popup-val {
    font-weight: 500;
    font-size: 11px;
    text-align: right;
  }

  .popup-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    margin-top: 5px;
    letter-spacing: 0.03em;
  }

  /* proximity labels */
  .prox-label {
    background: transparent;
    border: none;
    font-size: 9.5px;
    font-weight: 600;
    color: #7a6a5a;
    letter-spacing: 0.04em;
    white-space: nowrap;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <h1>Mukuru — Materials &amp; Waste Resource Map</h1>
      <p>Nairobi, Kenya · Interactive Layer Explorer</p>
    </div>
  </header>
  <div id="map-container">
    <div id="map"></div>

    <!-- Right: Layer Controls -->
    <div id="layer-panel">
      <div class="panel-header">Map Layers</div>

      <div class="layer-item" onclick="toggleLayer('categories')">
        <label class="toggle-switch" onclick="event.stopPropagation()">
          <input type="checkbox" id="toggle-categories" checked onchange="toggleLayer('categories')">
          <div class="toggle-track"></div>
        </label>
        <div>
          <div class="layer-label">Material Categories</div>
          <div class="layer-sub">By type of material</div>
        </div>
      </div>

      <div class="layer-item" onclick="toggleLayer('cost')">
        <label class="toggle-switch" onclick="event.stopPropagation()">
          <input type="checkbox" id="toggle-cost" onchange="toggleLayer('cost')">
          <div class="toggle-track"></div>
        </label>
        <div>
          <div class="layer-label">Cost Access</div>
          <div class="layer-sub">By access cost level</div>
        </div>
      </div>

      <div class="layer-item" onclick="toggleLayer('waste')">
        <label class="toggle-switch" onclick="event.stopPropagation()">
          <input type="checkbox" id="toggle-waste" onchange="toggleLayer('waste')">
          <div class="toggle-track"></div>
        </label>
        <div>
          <div class="layer-label">Waste Sites</div>
          <div class="layer-sub">Disposal &amp; collection points</div>
        </div>
      </div>

      <div class="layer-item" onclick="toggleLayer('proximity')">
        <label class="toggle-switch" onclick="event.stopPropagation()">
          <input type="checkbox" id="toggle-proximity" onchange="toggleLayer('proximity')">
          <div class="toggle-track"></div>
        </label>
        <div>
          <div class="layer-label">Proximity Zones</div>
          <div class="layer-sub">Distance rings from Mukuru</div>
        </div>
      </div>
    </div>

    <!-- Left: Dynamic Legend -->
    <div id="legend-panel">
      <div class="panel-header">Legend</div>
      <div id="legend-content"></div>
    </div>
  </div>
</div>

};

// ── Layer Storage ──
const layers = {};
const labelLayers = {};

// ── Nairobi Boundary ──
L.geoJSON(NAIROBI, {
  style: {
    color: '#1a1a1a',
    weight: 2.5,
    dashArray: '10 6',
    fill: false,
    opacity: 0.6
  }
}).addTo(map);

// ── Mukuru Boundary ──
L.geoJSON(MUKURU, {
  style: {
    color: '#1a1a1a',
    weight: 1.5,
    dashArray: '6 4',
    fill: false,
    opacity: 0.85
  }
}).addTo(map);

// ── 1. Categories Layer ──
function makePopup(p) {
  const catColor = CATEGORY_COLORS[p.Category] || '#888';
  const costColor = COST_COLORS[p.Cost_Access] || '#888';
  return `<div class="popup-name">${p.Name}</div>
    <div class="popup-row"><span class="popup-label">Category</span><span class="popup-val">${p.Category}</span></div>
    <div class="popup-row"><span class="popup-label">Material</span><span class="popup-val">${(p.Material||'').split(',')[0]}</span></div>
    <div class="popup-row"><span class="popup-label">Location</span><span class="popup-val">${p.Location||''}</span></div>
    <div class="popup-row"><span class="popup-label">Dist. to Mukuru</span><span class="popup-val">${p.Dist_km_to_Mukuru} km</span></div>
    <span class="popup-tag" style="background:${catColor}22;color:${catColor};border:1px solid ${catColor}44">${p.Category}</span>
    <span class="popup-tag" style="background:${costColor}22;color:${costColor};border:1px solid ${costColor}44;margin-left:4px">${p.Cost_Access}</span>`;
}

layers.categories = L.geoJSON(MATERIALS, {
  pointToLayer: (feat, latlng) => {
    const cat = feat.properties.Category;
    const color = CATEGORY_COLORS[cat] || '#888';
    return L.circleMarker(latlng, {
      radius: 6,
      fillColor: color,
      color: '#fff',
      weight: 1.2,
      fillOpacity: 0.82,
      opacity: 1
    });
  },
  onEachFeature: (feat, layer) => {
    layer.bindPopup(makePopup(feat.properties));
  }
}).addTo(map);

// ── 2. Cost Layer ──
layers.cost = L.geoJSON(MATERIALS, {
  pointToLayer: (feat, latlng) => {
    const cost = feat.properties.Cost_Access;
    const color = COST_COLORS[cost] || '#888';
    return L.circleMarker(latlng, {
      radius: 9,
      fillColor: 'transparent',
      color: color,
      weight: 2.2,
      fillOpacity: 0,
      opacity: 0.9
    });
  },
  onEachFeature: (feat, layer) => {
    layer.bindPopup(makePopup(feat.properties));
  }
});

// ── 3. Waste Layer ──
function plusIcon(color) {
  return L.divIcon({
    className: '',
    html: `<svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
      <line x1="7" y1="1" x2="7" y2="13" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="1" y1="7" x2="13" y2="7" stroke="${color}" stroke-width="2.5" stroke-linecap="round"/>
    </svg>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });
}

layers.waste = L.geoJSON(WASTE, {
  pointToLayer: (feat, latlng) => {
    return L.marker(latlng, { icon: plusIcon('#1a1a1a') });
  },
  onEachFeature: (feat, layer) => {
    const p = feat.properties;
    layer.bindPopup(`<div class="popup-name">Waste Disposal Site</div>
      <div class="popup-row"><span class="popup-label">Env. Score</span><span class="popup-val">${p.environmental ? p.environmental.toFixed(3) : 'N/A'}</span></div>
      <div class="popup-row"><span class="popup-label">Total Score</span><span class="popup-val">${p.total != null ? p.total : 'N/A'}</span></div>
      <div class="popup-row"><span class="popup-label">Layer</span><span class="popup-val">${p.layer||''}</span></div>`);
  }
});

// ── 4. Proximity Layer ──
const proximityGroup = L.layerGroup();
const proximityLabelGroup = L.layerGroup();

PROXIMITY.features.forEach(feat => {
  const dist = feat.properties.distance;
  const distKm = dist / 1000;
  const ringId = feat.properties.ringId;

  // Determine label
  let label;
  if (distKm <= 5) {
    label = distKm + ' km';
  } else {
    label = distKm + ' km';
  }

  // Style
  const lyr = L.geoJSON(feat, {
    style: {
      color: '#9e8e7e',
      weight: 1.2,
      dashArray: '5 5',
      fill: false,
      opacity: 0.7
    }
  });
  proximityGroup.addLayer(lyr);

  // Label: place at top of circle (approx)
  try {
    let center;
    const coords = feat.geometry.coordinates;
    // MultiPolygon: use first ring
    const ring = coords[0][0];
    // Find northernmost point (min latitude in southern hemisphere = most north)
    let northPt = ring[0];
    for (const pt of ring) {
      if (pt[1] > northPt[1]) northPt = pt;
    }
    center = L.latLng(northPt[1], northPt[0]);

    const labelMarker = L.marker(center, {
      icon: L.divIcon({
        className: 'prox-label',
        html: `<span>${label}</span>`,
        iconAnchor: [16, 8]
      }),
      interactive: false,
      zIndexOffset: -100
    });
    proximityLabelGroup.addLayer(labelMarker);
  } catch(e) {}
});

layers.proximity = L.layerGroup([proximityGroup, proximityLabelGroup]);

// ── Legend ──
const legendDefs = {
  categories: {
    title: 'Material Categories',
    items: Object.entries(CATEGORY_COLORS).map(([k, v]) => ({
      type: 'dot', color: v, label: k
    }))
  },
  cost: {
    title: 'Cost Access',
    items: Object.entries(COST_COLORS).map(([k, v]) => ({
      type: 'circle', color: v, label: k
    }))
  },
  waste: {
    title: 'Waste Sites',
    items: [{ type: 'plus', color: '#1a1a1a', label: 'Disposal / Collection Site' }]
  },
  proximity: {
    title: 'Proximity Zones',
    items: [
      { type: 'line', color: '#9e8e7e', label: '1–5 km (1 km intervals)' },
      { type: 'line', color: '#9e8e7e', label: '5–20 km (5 km intervals)' }
    ]
  }
};

// Always-present boundary items
const baseLegend = `
  <div class="legend-section">
    <div class="legend-title">Boundaries</div>
    <div class="legend-item">
      <div class="legend-line" style="color:#1a1a1a;border-top-width:2.5px"></div>
      <span>Nairobi City</span>
    </div>
    <div class="legend-item">
      <div class="legend-line" style="color:#1a1a1a;border-top-width:1.5px"></div>
      <span>Mukuru Settlement</span>
    </div>
  </div>`;

function renderLegend() {
  const activeKeys = ['categories','cost','waste','proximity'].filter(k => {
    const cb = document.getElementById('toggle-' + k);
    return cb && cb.checked;
  });

  let html = baseLegend;

  activeKeys.forEach(key => {
    const def = legendDefs[key];
    if (!def) return;
    html += `<div class="legend-section"><div class="legend-title">${def.title}</div>`;
    def.items.forEach(item => {
      let icon = '';
      if (item.type === 'dot') {
        icon = `<div class="legend-dot" style="background:${item.color}"></div>`;
      } else if (item.type === 'circle') {
        icon = `<div class="legend-circle" style="border-color:${item.color}"></div>`;
      } else if (item.type === 'line') {
        icon = `<div class="legend-line" style="color:${item.color}"></div>`;
      } else if (item.type === 'plus') {
        icon = `<div class="legend-plus">+</div>`;
      }
      html += `<div class="legend-item">${icon}<span>${item.label}</span></div>`;
    });
    html += `</div>`;
  });

  document.getElementById('legend-content').innerHTML = html;
}

// ── Toggle Logic ──
function toggleLayer(name) {
  const cb = document.getElementById('toggle-' + name);
  const lyr = layers[name];
  if (!lyr) return;
  if (cb.checked) {
    lyr.addTo(map);
  } else {
    map.removeLayer(lyr);
  }
  renderLegend();
}

// Init legend
renderLegend();
</script>
</body>
</html>
